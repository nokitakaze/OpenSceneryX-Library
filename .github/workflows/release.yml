name: Build and Release

on:
  push:
    tags:
      # Trigger the workflow only when a tag is pushed
      - '*'

jobs:
  release:
    name: Create Release
    runs-on: macos-latest
    permissions:
      # Grant necessary permissions to create a release and upload assets
      contents: write

    steps:
      - name: Checkout repository
        # Check out the repository code to the runner
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        # Set up the specified Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Optional: cache dependencies to speed up the workflow

      - name: Install dependencies
        # Upgrade pip and install required dependencies from requirements.txt
        run: |
          python -m pip install --upgrade pip
          pip install -r bin/requirements.txt

      - name: Run build script
        # Make the bash script executable and run it
        # The script handles tag validation and runs build.py
        run: |
          cd bin
          chmod +x build_release_file.sh
          ./build_release_file.sh

      - name: Create Release and Upload Artifact
        # Create a GitHub Release and attach the built zip file
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          # Use a wildcard to match the generated artifact
          files: builds/OpenSceneryX-*.zip
          generate_release_notes: true
